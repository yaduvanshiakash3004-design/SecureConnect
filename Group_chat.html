<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Team - SecureConnect</title>
    <link rel="stylesheet" href="Group_Chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="chat-dashboard">

    <aside class="sidebar-panel left-panel">
        <div class="meta-card">
            <img src="6.jpeg" alt="Design Team Group Avatar" class="avatar-lg">
            <h2>Design Team</h2>
            <span class="status-sub text-muted">4 Members • 2 Online</span>
        </div>

        <div class="directory-section">
            <h3>Members</h3>
            <div class="user-row">
                <img src="1.jpeg" alt="Profile pic" class="avatar-sm">
                <span>Vivek Bhaiya</span>
            </div>
            <div class="user-row">
                <img src="2.jpeg" alt="Profile pic" class="avatar-sm">
                <span>Muskan</span>
            </div>
            <div class="user-row">
                <img src="3.jpeg" alt="Profile pic" class="avatar-sm">
                <span>Vidit</span>
            </div>
            <div class="user-row">
                <img src="4.jpeg" alt="Profile pic" class="avatar-sm">
                <span>Akash</span>
            </div>
        </div>
    </aside>

    <main class="chat-stream">
        <header class="stream-header">
            <h2># Design Team</h2>
            <div class="action-tray">
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-users"></i>
            </div>
        </header>

        <div class="message-scroller">
            <div class="msg-bubble incoming">
                <img src="1.jpeg" class="msg-avatar">
                <div class="msg-body">
                    <span class="handle">Vivek Bhaiya</span>
                    <p class="bubble">Can we finalize the UI today?</p>
                </div>
            </div>

            <div class="msg-bubble outgoing">
                <div class="msg-body">
                    <span class="handle">Akash</span>
                    <p class="bubble">Yes, I will complete it today.</p>
                </div>
                <img src="4.jpeg" class="msg-avatar">
            </div>

            <div class="msg-bubble incoming">
                <img src="2.jpeg" class="msg-avatar">
                <div class="msg-body">
                    <span class="handle">Muskan</span>
                    <p class="bubble">Great 👍</p>
                </div>
            </div>

            <div class="msg-bubble incoming">
                <img src="3.jpeg" class="msg-avatar">
                <div class="msg-body">
                    <span class="handle">Vidit</span>
                    <p class="bubble">Login page is completed.</p>
                </div>
            </div>
        </div>

        <footer class="input-tray">
            <input type="text" placeholder="Type a message...">
            <button type="button" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </main>

    <aside class="sidebar-panel right-panel">
        <h3>Shared Files</h3>
        <div class="file-link"><i class="fa-regular fa-file-pdf"></i> UI-Design.pdf</div>
        <div class="file-link"><i class="fa-regular fa-file-word"></i> Report.docx</div>
        <div class="file-link"><i class="fa-regular fa-file-powerpoint"></i> Presentation.pptx</div>
    </aside>

</div>

</body>
</html>
