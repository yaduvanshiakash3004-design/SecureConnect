<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureConnect - Sign In</title>
    <link rel="stylesheet" href="Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="login-card">
    <div class="brand">
        <i class="fa-solid fa-shield-halved"></i>
        <span>SecureConnect</span>
    </div>

    <h2>Welcome Back!</h2>
    <p>Login to continue your conversations</p>

    <form action="#" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********" required>
        </div>

        <div class="form-actions">
            <label class="remember-me">
                <input type="checkbox"> Remember Me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="submit-btn">Login</button>
    </form>

    <div class="auth-divider">
        <span>OR</span>
    </div>

    <div class="oauth-options">
        <button type="button"><i class="fab fa-google"></i></button>
        <button type="button"><i class="fab fa-github"></i></button>
        <button type="button"><i class="fab fa-apple"></i></button>
    </div>

    <p class="redirect-text">
        Don't have an account? <a href="register.html">Sign Up</a>
    </p>
</div>

</body>
</html>
